 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <form action="">
        <div>
            <label for="fullname">Tên</label>
            <input type="text" name="fullname" id="fullname" placeholder="tên của bạn" value="Phong Hải">
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Email của bạn" value="Nguyenphonghai48@gmail.com">
        </div>
        <div>
            <label for="psw">Mật khẩu</label>
            <input type="password" name="psw" id="psw" placeholder="mật khẩu của bạn">
        </div>
        <div>
            <label for="age">Tuổi</label>
            <input type="number" name="age" id="age" placeholder="Tuổi của bạn">
        </div>
        <div>
            <label for="avatar">Avatar</label>
            <input type="file" name="avatar" id="avatar">
        </div>
         <div>
            <label>Gender</label>
            <label><input type="radio" value="male" name="gender" checked >Nam</label>
            <label><input type="radio" value="female" name="gender">Nữ</label>
            <label><input type="radio" value="unknown" name="gender">Không biết</label>
        </div>
        <div>
            <label>Habit</label>
            <label><input type="checkbox" value="code" name="Habit" checked >Code</label>
            <label><input type="checkbox" value="soccer" name="Habit">Bóng Đá</label>
            <label><input type="checkbox" value="volleyball" name="Habit">Bóng chuyền</label>
        </div>
        <div>
            <label for="province">Tỉnh/Thành phố</label>
            <select name="province" id="province">
                <option value="">Chọn Tỉnh/Thành phố</option>
                <option value="HaNoi" selected>Hà Nội</option>
                <option value="HoChiMinh">Tp.Hồ Chí Minh</option>
                <option value="DaNang">Tp.Đà Nẵng</option>
            </select>
        </div>
        <div>
            <label for="message">Tin nhắn</label>
            <textarea name="message" id="message" placeholder="Tin nhắn ..." rows="5" cols="30">Nhập tin nhắn ở đây</textarea>
        </div>
        <div>
            <input type="range" name="" id="">
        </div>
        <div>
            <input type="date" name="" id="">
        </div>
        <div>
            <input type="search" name="" id="">
        </div>
        <button>Submit</button>
    </form>
 </body>
 </html>
