<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAYA ROASTING CO.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="container">
            <header>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#pages">Pages</a></li>
                    <li><a href="#articles">Articles</a></li>
                </ul>
                <a href="#" class="logo">
                    <img src="images/brand.png" alt="hinh1">
                </a>
                <ul>
                    <li><a href="#contact">Contact</a></li>
                    <li><a href="#shop">Shop</a></li>
                    <li><a href="#locations">Locations</a></li>
                </ul>
            </header>
            <main>
                <section class="top-banner">
                     <a href="#">
                        <img src="images/img1.jpg" alt="">
                    </a>
                </section>
                <section class="About-Us">
                    <p>Because we love coffee</p>
                    <h1>About Us</h3>
                </section>
                <section class="about-section">
                        <div class="about-grid">
                            <div class="feature-item feature-image">
                                <a href="">
                                    <img src="images/latte.jpg" alt="Latte Art">
                                </a>
                            </div>
                            
                            <div class="feature-item feature-text">
                                <span class="subtitle">OUR MISSION</span>
                                <h1>It all began with a modest concept: Create amazing coffee</h1>
                            </div>
                            
                            <div class="feature-item feature-image">
                                <a href="">
                                    <img src="images/espresso-machine.jpg" alt="Espresso Machine">
                                </a>
                            </div>

                            <div class="feature-item feature-text">
                                <span class="subtitle">HOME DELIVERY</span>
                                <h1>Quality coffee delivered to your door</h1>
                            </div>
                            
                            <div class="feature-item feature-image">
                                <a href="">
                                    <img src="images/coffee-and-book.jpg" alt="Coffee and book">
                                </a>
                            </div>
                            
                            <div class="feature-item feature-text">
                                <span class="subtitle">TIME TO CHILL</span>
                                <h1>Black Coffee Shaved Ice</h1>
                            </div>
                        </div>
                </section>
                <section>
                    <div class="bottom-banner">
                        <a href="">
                            <img src="images/coffee.jpg" alt="coffee-banner">
                        </a> 
                    </div>
                </section>
            </main>
            <hr>
            <footer>
                <section>
                    <div class="footer" class="logo">
                        <a href="">
                            <img src="images/brand.png" alt="">
                        </a>
                        <form action="#" method="GET">
                            <input type="email" name="email" placeholder="Enter email address..." required>
                            <button type="submit">Contact Us</button>
                        </form>
                    </div>
                </section>
            </footer>
        </div>
    </section>
</body>
</html>
